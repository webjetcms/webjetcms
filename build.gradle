// Development: ./gradlew bootRun
// Production:  ./gradlew war (produces standard WAR for external Tomcat 11)
// For executable WAR with embedded server: ./gradlew bootWar (requires Spring Boot plugin)

def mostRecentVersion(List<String> versions) {
    if (versions == null || versions.isEmpty()) return versions[0]
    def sorted = versions.sort { a, b ->
        def verA = a.replaceAll(/[^0-9.]/, '').split('\\.')
        def verB = b.replaceAll(/[^0-9.]/, '').split('\\.')
        def len = Math.min(verA.length, verB.length)
        for (int i = 0; i < len; i++) {
            def numA = verA[i].isInteger() ? Integer.parseInt(verA[i]) : 0
            def numB = verB[i].isInteger() ? Integer.parseInt(verB[i]) : 0
            if (numA != numB) return numA <=> numB
        }
        verA.length() <=> verB.length()
    }
    return sorted[-1]
}
