// Generate self-signed certificate for HTTPS (migrated from gretty's auto-generated keystore)
// Gretty auto-generated build/gretty/https-keystore.p12; now generated via keytool
task generateCertificate(type: Exec) {
    group = 'build'
    description = 'Generates self-signed certificate for embedded Tomcat HTTPS'
    def certFile = file("${projectDir}/src/main/resources/certificates/https-keystore.p12")
    def certDir = certFile.parentFile
    onlyIf { !certFile.exists() }
    doFirst {
        certDir.mkdirs()
    }
    workingDir projectDir
    // macOS: keytool, Linux: keytool (from JDK)
    def keytool = 'keytool'
    commandLine keytool,
        '-genkeypair',
        '-alias', 'tomcat',
        '-keyalg', 'EC',
        '-groupname', 'secp256r1',
        '-keystore', certFile.absolutePath,
        '-storetype', 'PKCS12',
        '-storepass', 'changeit',
        '-keypass', 'changeit',
        '-validity', '365',
        '-sigalg', 'SHA256withECDSA',
        '-dname', 'CN=WebJET CMS, OU=Development, O=InterWay, L=Bratislava, C=SK',
        '-ext', 'SAN=DNS:localhost,IP:127.0.0.1'
}

// Ensure certificate is generated before bootRun
bootRun.dependsOn generateCertificate

