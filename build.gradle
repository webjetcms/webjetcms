test {
    useJUnitPlatform()
    systemProperty 'sun.net.client.defaultConnectTimeout', '10000'
    systemProperty 'sun.net.client.defaultReadTimeout', '10000'
    systemProperty 'file.encoding', 'UTF-8'
    systemProperty 'user.language', 'sk'
    systemProperty 'user.country', 'SK'
    systemProperty 'webjetDbname', System.getProperty('webjetDbname') ?: '/poolman-local.xml'
    jvmArgs = [ "-javaagent:${configurations.agent.singleFile}" ]
    testLogging {
        events "passed", "skipped", "failed", "standard_out", "standard_error"
        showStandardStreams = true
        exceptionFormat = 'full'
        showCauses = true
        showExceptions = true
        showStackTraces = true
    }
    // For even more verbose output during development
    afterSuite { desc, result ->
        if (!desc.parent) {
            println "\nTest result: ${result.resultType}"
            println "Test summary: ${result.testCount} tests, " +
                    "${result.successfulTestCount} succeeded, " +
                    "${result.failedTestCount} failed, " +
                    "${result.skippedTestCount} skipped"
        }
    }
}

