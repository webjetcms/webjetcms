<script data-th-inline="javascript">
    let stepTabs = [
        { id: 'main', title: /*[[\#{datatable.tab.basic}]]*/ '', selected: true },
        { id: 'advanced', title: /*[[\#{datatable.tab.advanced}]]*/ '', selected: false },
        { id: 'stepBonusHtml', title: /*[[\#{components.insert_script.body}]]*/ '', content: "<div></div>" }
    ];

    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const urlFormName = urlParams.get('formName');

    WJ.breadcrumb({
        id: "form-stats",
        tabs: [
            {
                url: "/apps/form/admin/detail/?formName=" + urlFormName,
                title: urlFormName,
                active: true
            }
        ],
        backlink: {
            url: "/apps/form/admin/",
            title: WJ.translate("forms.formsList.js"),
        }
    });
</script>

<script type="module" th:inline="javascript">

    import { StatsByCharts } from '/apps/_common/charts/stats-by-charts.js';

    fetch("/rest/multistep-form-stat/get-stat-data?form-name=" + urlFormName)
        .then(response => response.json())
        .then(data => {
            document.getElementById("responsesCount").textContent = data.totalResponses;
            document.getElementById("averageDuration").textContent = data.averageDuration;
            document.getElementById("durationDays").textContent = "15";

            let instance = new StatsByCharts(
                {
                    targetSelector: "#chartContainer",
                    id: "form-stats",
                    chartSettingBtnFn: (chartDef) => {
                        WJ.openIframeModalDatatable({
                            url: "/apps/form/admin/form-stats-table/?id=-1&formName=" + urlFormName + "&itemFormId=" + chartDef.id + "&showOnlyEditor=true",
                            width: 850,
                            height: 500,
                            buttonTitleKey: "button.save"
                        });
                    }
                }
            );

            instance.createCharts(data.chartData);


            window.addEventListener("stat-chart-update", async (e) => {
                const chartId = e?.detail?.id;
                if(chartId) {
                    fetch("/rest/multistep-form-stat/get-chart-data?form-name=" + urlFormName + "&item-form-id=" + chartId)
                        .then(response => response.json())
                        .then(data => {
                            console.log("NEW DATA : ", data);
                            instance.updateChart(data);
                        })
                        .catch(error => {
                            console.error("Error fetching chart new data:", error);
                        });
                }
            });
        })
        .catch(error => {
            console.error("Error fetching stats:", error);
        });

</script>
