<script data-th-inline="javascript">
    let stepTabs = [
        { id: 'main', title: /*[[\#{datatable.tab.basic}]]*/ '', selected: true },
        { id: 'advanced', title: /*[[\#{datatable.tab.advanced}]]*/ '', selected: false },
        { id: 'stepBonusHtml', title: /*[[\#{components.insert_script.body}]]*/ '', content: "<div></div>" }
    ];

    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const urlFormName = urlParams.get('formName');

    WJ.breadcrumb({
        id: "form-stats",
        tabs: [
            {
                url: "/apps/form/admin/detail/?formName=" + urlFormName,
                title: urlFormName,
                active: true
            }
        ],
        backlink: {
            url: "/apps/form/admin/",
            title: WJ.translate("forms.formsList.js"),
        }
    });

    const advancedCards = ["viewCount", "responseAttempts", "errorsCount", "conversionRate"];
</script>

<script type="module" th:inline="javascript">

    function insertFilterToStatsPills() {
        const pills = document.querySelector("ul#pills-form-stats");
        const element = document.getElementById("filter");

        const input = document.getElementById("expandBonusChartButton");
        input.addEventListener("click", function() {
            expandBonusChart.style.display = "none";
            $("#bonusChartContainer").slideDown(500);

            advancedCards.forEach(id => {
                const card = document.querySelector(`[data-stat-id="${id}"]`);
                if(card) {
                    $(card).slideDown(500);
                }
            });
        });

        pills.appendChild(element);

        // Initialize datepicker on filter inputs
        $('#filter .datepicker').each(function (key, dateInput) {
            let $this = $(dateInput);
            if ($this.hasClass("datepickerbinded")) return;
            $this.addClass("datepickerbinded");

            new $.fn.dataTable.Editor.DateTime($this, {
                format: 'L',
                momentLocale: window.userLng,
                locale: window.userLng,
                keyInput: false,
                i18n: WJ.getDatetimeLocalization()
            });
        });
    }

    window.domReady.add(function () {
        WJ.headerTabs({
            id: 'tabsFilter',
            tabs: [
                { url: '/apps/form/admin/', title: WJ.translate('forms.formsList.js'), active: false },
                { url: '/apps/form/admin/form-steps/?formName=' + urlFormName, title: WJ.translate('components.form_items.navbar_title.js'), active: false },
                { url: '/apps/form/admin/form-stats/?formName=' + urlFormName, title: WJ.translate('components.form_stat.navbar_title.js'), active: true },
                { url: '/apps/form/admin/archived/', title: WJ.translate('forms.archiveList.js'), active: false },
                { url: '/apps/form/admin/regexps/', title: WJ.translate('components.form.reg_exp.js'), active: false }
            ]
        });

        insertFilterToStatsPills();
        bindDateFilter();
        loadStats();
    });

    import { StatsByCharts } from '/apps/_common/charts/stats-by-charts.js';

    let statsChartsInstance = null;
    let pieLanguagesChart;
    let tableReferrersChart;
    let pieFieldsErrorsChart;
    let pieSystemErrorsChart;
    let lineSystemErrorsChart;

    function bindDateFilter() {
        const filterButton = document.querySelector("#filter button.dt-filtrujem-dayDate");
        if(filterButton == null || filterButton.dataset.binded === "true") return;
        filterButton.dataset.binded = "true";

        filterButton.addEventListener("click", function(e) {
            e.preventDefault();
            loadStats();
        });

        document.querySelectorAll("#filter .form-date-div input.filter-input").forEach(input => {
            input.addEventListener("keypress", function(e) {
                if(e.key === "Enter") {
                    e.preventDefault();
                    loadStats();
                }
            });
        });
    }

    function getStatUrl(path, params = {}) {
        const searchParams = new URLSearchParams();
        searchParams.set("form-name", urlFormName);

        const dayDate = ChartTools.getDateRangeWithName("dayDate", 30);
        if(dayDate !== "") searchParams.set("dayDate", dayDate);

        Object.entries(params).forEach(([key, value]) => {
            searchParams.set(key, value);
        });

        return path + "?" + searchParams.toString();
    }

    function updateStatCards(data) {
        document.getElementById("responsesCount").textContent = data.totalResponses;
        document.getElementById("averageDuration").textContent = data.averageDuration;
        document.getElementById("durationDays").textContent = data.durationDays;
        document.getElementById("lastResponseDateTime").textContent = data.lastResponseDateTime;
        document.getElementById("viewCount").textContent = data.viewCount;
        document.getElementById("responseAttempts").textContent = data.responseAttempts;
        document.getElementById("errorsCount").textContent = data.chartErrorData.allErrorsCount;

        const conversionRate = data.viewCount > 0 ? ((data.totalResponses / data.viewCount) * 100).toFixed(2) : "0.00";
        document.getElementById("conversionRate").textContent = conversionRate + "%";
    }

    async function renderStatsCharts(data) {
        if(statsChartsInstance == null) {
            statsChartsInstance = new StatsByCharts({
                targetSelector: "#chartContainer",
                id: "form-stats",
                chartSettingBtnFn: (chartDef) => {
                    WJ.openIframeModalDatatable({
                        url: "/apps/form/admin/form-stats-table/?id=-1&formName=" + encodeURIComponent(urlFormName) + "&itemFormId=" + encodeURIComponent(chartDef.id) + "&showOnlyEditor=true",
                        width: 850,
                        height: 500,
                        buttonTitleKey: "button.save"
                    });
                }
            });

            statsChartsInstance.createCharts(data.chartData);
            return;
        }

        await updateStatsCharts(data.chartData);
    }

    async function updateStatsCharts(chartsDefinitions) {
        if(statsChartsInstance?.chartsInstances == null) return;

        for(const chartDef of chartsDefinitions) {
            const chartForm = statsChartsInstance.chartsInstances[chartDef.id];
            if(chartForm == null) continue;

            chartForm.chartData = chartDef.values;
            if(chartForm instanceof ChartTools.TableChartForm && Array.isArray(chartDef.paramsNames)) {
                chartForm.paramsNames = chartDef.paramsNames;
            }

            await ChartTools.updateChart(chartForm);
        }
    }

    async function renderAdvancedCharts(data) {
        if(pieLanguagesChart == null) {
            await createAdvancedCharts(data);
            return;
        }

        pieLanguagesChart.chartData = data.chartBonusData.languageData;
        await ChartTools.updateChart(pieLanguagesChart);

        tableReferrersChart.chartData = data.chartBonusData.referrerData;
        await ChartTools.updateChart(tableReferrersChart);

        pieFieldsErrorsChart.chartData = data.chartErrorData.pieErrorData;
        await ChartTools.updateChart(pieFieldsErrorsChart);

        pieSystemErrorsChart.chartData = data.chartErrorData.pieSystemErrorData;
        await ChartTools.updateChart(pieSystemErrorsChart);

        lineSystemErrorsChart.chartData = ChartTools.convertDataForLineChart(data.chartErrorData.timelineErrorData);
        await ChartTools.updateChart(lineSystemErrorsChart);
    }

    async function createAdvancedCharts(data) {
        window.initAmcharts().then(module => {
            const pieLanguagesConfig = {
                yAxeName: "count",
                xAxeName: "name",
                chartTitle: '[[#{components.multistep_form.languages_chart.label}]]',
                chartDivId: "form-stats-pieLanguages",
                chartData: data.chartBonusData.languageData
            };
            pieLanguagesChart = new ChartTools.PieChartForm(pieLanguagesConfig);
            ChartTools.createAmchart(pieLanguagesChart);

            const tableReferrersConfig = {
                paramsNames: ["name", "count"],
                chartTitle: '[[#{components.multistep_form.referrer_chart.label}]]',
                chartDivId: "form-stats-tableReferrers",
                chartData: data.chartBonusData.referrerData
            };
            tableReferrersChart = new ChartTools.TableChartForm(tableReferrersConfig);
            tableReferrersChart.headerNames = [
                window.WJ.translate("admin.welcome.bookmarks.dialog.urlAddress.js"),
                window.WJ.translate("components.stats_by_charts.table.count.js")
            ];
            ChartTools.createAmchart(tableReferrersChart);

            const pieFieldsErrorsConfig = {
                yAxeName: "count",
                xAxeName: "name",
                chartTitle: '[[#{components.multistep_form.field_errors_chart.label}]]',
                chartDivId: "form-stats-pieFieldsErrors",
                chartData: data.chartErrorData.pieErrorData
            };
            pieFieldsErrorsChart = new ChartTools.PieChartForm(pieFieldsErrorsConfig);
            pieFieldsErrorsChart.labelKey = "components.multistep_form.field_error_sum.label.js";
            ChartTools.createAmchart(pieFieldsErrorsChart);

            const pieSystemErrorsConfig = {
                yAxeName: "count",
                xAxeName: "name",
                chartTitle: '[[#{components.multistep_form.system_errors_chart.label}]]',
                chartDivId: "form-stats-pieSystemErrors",
                chartData: data.chartErrorData.pieSystemErrorData
            };
            pieSystemErrorsChart = new ChartTools.PieChartForm(pieSystemErrorsConfig);
            pieSystemErrorsChart.labelKey = "components.multistep_form.field_error_sum.label.js";
            ChartTools.createAmchart(pieSystemErrorsChart);

            const lineSystemErrorsConfig = {
                yAxeNames: ChartTools.getLineChartYAxeNameObjs(["count"], [undefined]),
                xAxeName: "dayDate",
                chartTitle: '[[#{components.multistep_form.stat.step_stat}]]',
                chartDivId: "form-stats-lineTimelineErrors",
                chartData: ChartTools.convertDataForLineChart(data.chartErrorData.timelineErrorData),
                dateType: ChartTools.DateType.Auto
            };

            lineSystemErrorsChart = new ChartTools.LineChartForm(lineSystemErrorsConfig);
            ChartTools.createAmchart(lineSystemErrorsChart);
        });
    }

    async function loadStats() {
        WJ.showLoader();

        try {
            const response = await fetch(getStatUrl("/rest/multistep-form-stat/get-stat-data"));
            const data = await response.json();

            updateStatCards(data);
            await renderStatsCharts(data);
            await renderAdvancedCharts(data);
        } catch(error) {
            console.error("Error fetching stats:", error);
        } finally {
            WJ.hideLoader();
        }
    }

    window.addEventListener("stat-chart-update", async (e) => {
        const chartId = e?.detail?.id;
        if(chartId == null || statsChartsInstance == null) return;

        //console.log("chart-update event received for chartId:", chartId);
        //WJ.showLoader();

        try {
            const response = await fetch(getStatUrl("/rest/multistep-form-stat/get-chart-data", {"item-form-id": chartId}));
            const data = await response.json();
            await updateStatsCharts(data);
        } catch(error) {
            console.error("Error fetching chart new data:", error);
        }
    });
</script>
