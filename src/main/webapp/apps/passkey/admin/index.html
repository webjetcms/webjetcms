<script type="text/javascript" data-th-inline="javascript">
    var passkeyDataTable;
    let url = "/admin/rest/passkey";
    let columns = /*[(${layout.getDataTableColumns("sk.iway.iwcm.system.spring.passkey.PasskeyCredentialEntity")})]*/ [];
</script>
<script type="text/javascript">

    window.domReady.add(function () {

        passkeyDataTable = WJ.DataTable({
            url: url,
            serverSide: true,
            columns: columns,
            id: "passkeyDataTable",
            fetchOnEdit: true,
        });

        // Hide create button - passkey registration uses the WebAuthn browser flow
        passkeyDataTable.hideButton("duplicate");
        passkeyDataTable.hideButton("import");
        passkeyDataTable.hideButton("export");

        passkeyDataTable.EDITOR.on("initSubmit", function( e, action ) {
            console.log("Som precreate event, e=", e, "action=", action);
            if ("create" === action) {
                const label = passkeyDataTable.EDITOR.field("label").val();
                if (label && label.trim().length > 1) {
                    return new Promise(function (resolve) {
                        registerPasskey(label, resolve);
                    });
                }
            }
        });
    });

    function registerPasskey(label, callback) {
        if (!label) label = "PassKey";

        // Step 1: Get registration options from Spring Security
        fetch('/webauthn/register/options', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        })
        .then(function(response) {
            if (!response.ok) throw new Error('Failed to get registration options');
            return response.json();
        })
        .then(function(options) {
            options.user.id = base64urlToBuffer(options.user.id);
            options.challenge = base64urlToBuffer(options.challenge);
            if (options.excludeCredentials) {
                options.excludeCredentials = options.excludeCredentials.map(function(cred) {
                    cred.id = base64urlToBuffer(cred.id);
                    return cred;
                });
            }
            return navigator.credentials.create({ publicKey: options });
        })
        .then(function(credential) {
            var body = {
                publicKey: {
                    credential: {
                        id: credential.id,
                        rawId: bufferToBase64url(credential.rawId),
                        response: {
                            attestationObject: bufferToBase64url(credential.response.attestationObject),
                            clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
                            transports: credential.response.getTransports ? credential.response.getTransports() : []
                        },
                        type: credential.type,
                        clientExtensionResults: credential.getClientExtensionResults(),
                        authenticatorAttachment: credential.authenticatorAttachment
                    },
                    label: label
                }
            };
            return fetch('/webauthn/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
        })
        .then(function(response) {
            if (!response.ok) throw new Error('Registration failed');
            passkeyDataTable.ajax.reload();
            WJ.notifySuccess('[[#{passkey.manage.title}]]', '[[#{passkey.manage.registerSuccess}]]', 3000);
            callback(false);
            //close the editor after successful registration
            passkeyDataTable.EDITOR.close();
        })
        .catch(function(error) {
            console.error('PassKey registration error:', error);
            WJ.notifyError('[[#{passkey.manage.title}]]', '[[#{passkey.manage.registerError}]]' + ' ' + error.message);
            callback(false);
        });
    }

    function base64urlToBuffer(base64url) {
        var base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
        var padding = '='.repeat((4 - base64.length % 4) % 4);
        var binary = atob(base64 + padding);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    function bufferToBase64url(buffer) {
        var bytes = new Uint8Array(buffer);
        var binary = '';
        for (var i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

</script>

<div class="md-breadcrumb">
    [[#{passkey.manage.instructions}]]
</div>

<table id="passkeyDataTable" class="datatableInit table"></table>
