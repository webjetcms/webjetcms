# WebJET CMS - Spring Boot Configuration
# Migrated from Spring Web to Spring Boot 4.x

# Server configuration
server.servlet.context-path=/
server.tomcat.basedir=.

# Character encoding (default: utf-8)
server.servlet.encoding.charset=utf-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Multipart file upload settings
# MaximumPostSize from Constants.java: "5000m" (5000 MB)
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB

# Spring Boot 4.x compatibility
spring.main.allow-bean-definition-overriding=true
spring.main.web-application-type=servlet

# Logging
logging.level.org.springframework.web=INFO
logging.level.sk.iway.iwcm=INFO

# Disable Thymeleaf auto-configuration (we use custom WebjetViewResolver)
spring.thymeleaf.enabled=false

# JSP configuration (Spring Boot 4.x)
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp
