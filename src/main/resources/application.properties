# WebJET CMS - Spring Boot Configuration
# Migrated from Spring Web to Spring Boot 4.x

# Server configuration
server.servlet.context-path=/
server.tomcat.basedir=.

# HTTPS port 443
# HTTP port 80 is added by TomcatPortConfiguration customizer
server.port=443
# Redirect HTTP to HTTPS
server.tomcat.redirect-port=443
# Self-signed certificate (generated by generateCertificate task to src/main/resources/certificates/https-keystore.p12)
server.ssl.key-store=classpath:certificates/https-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=changeit
server.ssl.key-alias=tomcat
server.ssl.enabled=true

# Character encoding (default: utf-8)
server.servlet.encoding.charset=utf-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Multipart file upload settings
# MaximumPostSize from Constants.java: "5000m" (5000 MB)
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB

# Spring Boot 4.x compatibility
spring.main.allow-bean-definition-overriding=true
spring.main.web-application-type=servlet

# Logging
logging.level.org.springframework.web=INFO
logging.level.sk.iway.iwcm=INFO

# Disable Thymeleaf auto-configuration (we use custom WebjetViewResolver)
spring.thymeleaf.enabled=false

# JSP configuration (Spring Boot 4.x)
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# Error pages (Spring Boot 4.x - no BasicErrorController)
# Disable /error endpoint, error pages handled by ErrorPageRegistrar
error.path=
error.whitelabel.enabled=false
